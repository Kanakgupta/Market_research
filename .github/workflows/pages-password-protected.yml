name: Deploy Password-Protected Pages
# Trigger note: no-op update to force push-based workflow run when manual dispatch fails.
# Trigger note 2: additional no-op line for another push-triggered run.

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - ".github/workflows/pages-password-protected.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      STATIC_SITE_PASSWORD: ${{ secrets.STATIC_SITE_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate password secret
        run: |
          if [ -z "${STATIC_SITE_PASSWORD:-}" ]; then
            echo "STATIC_SITE_PASSWORD secret is missing."
            echo "Add repository secret STATIC_SITE_PASSWORD and re-run."
            exit 1
          fi

      - name: Install Staticrypt CLI
        run: npm install -g staticrypt

      - name: Build deploy folder
        run: |
          rm -rf protected_site
          mkdir -p protected_site
          cp -R docs/. protected_site/

      - name: Encrypt all HTML pages
        run: |
          shopt -s nullglob
          count=0
          for f in protected_site/*.html; do
            staticrypt "$f" "$STATIC_SITE_PASSWORD" -o "$f"
            count=$((count + 1))
          done
          echo "Encrypted $count HTML files"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: protected_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4